
<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>الصور والفيديو | أكاديمية المسارحة لكرة القدم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#05110b;color:white}
.container{width:min(1200px,calc(100% - 40px));margin:auto}
header{background:#06140e;border-bottom:1px solid #1f2e26}
.nav{display:flex;align-items:center;justify-content:space-between;min-height:70px}
.logo{font-weight:900;font-size:20px}
.menu{display:flex;gap:20px}
.menu a{color:#dcdcdc;text-decoration:none;font-weight:700}
.menu a.active{color:#d5b15a}
.hero{padding:40px 0;text-align:center}
.hero h1{font-size:40px;margin-bottom:10px}
.hero p{color:#c7d0ca;margin:0}
.gallery{margin-top:30px;display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.photo{height:170px;background:#0d1f17;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:50px}
.videos{margin-top:40px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.video-card{background:#081a12;border:1px solid #24352c;border-radius:16px;overflow:hidden}
.video-thumb{height:180px;background:#0d1f17;display:flex;align-items:center;justify-content:center;font-size:60px}
.video-content{padding:16px}
.video-content h3{margin:0 0 8px;font-size:20px}
.video-content p{margin:0;color:#c7d0ca;font-size:14px}
footer{margin-top:60px;padding:20px 0;border-top:1px solid #1f2e26;text-align:center;color:#aaa}
</style>
<link href="shared-layout.css" rel="stylesheet"/>
<style id="footer-copy-fix">
#site-footer .site-copy,
#site-footer .site-copy *{
  text-align:center !important;
}
</style>

</head>
<body><div id="site-header"></div>

<section class="hero">
<div class="container">

<p>تابع أبرز لقطات التدريبات والمباريات</p>
</div>
</section>
<section class="container">
<div class="gallery">
<div class="photo">📷</div>
<div class="photo">📷</div>
<div class="photo">📷</div>
<div class="photo">📷</div>
<div class="photo">📷</div>
<div class="photo">📷</div>
<div class="photo">📷</div>
<div class="photo">📷</div>
</div>
<div class="videos">
<div class="video-card">

<div class="video-content">

</div>
</div>
<div class="video-card">

<div class="video-content">

</html>
