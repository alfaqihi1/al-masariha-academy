<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متابعة الطلب | أكاديمية المسارحة لكرة القدم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#05110b;--panel:#081a12;--panel2:#102418;--gold:#d5b15a;--gold2:#f0d58f;--text:#f3f4ef;--muted:#b6c1b8;--line:rgba(255,255,255,.08);--green:#15915f;--danger:#c55252;--shadow:0 22px 55px rgba(0,0,0,.26)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;font-family:'Cairo',system-ui,sans-serif;background:radial-gradient(circle at top,rgba(213,177,90,.10),transparent 28%),linear-gradient(180deg,#030a07,#06130d 42%,#041009);color:var(--text);min-height:100vh}
    .page{width:min(1180px,calc(100% - 28px));margin:34px auto;padding-bottom:34px}
    .hero,.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));box-shadow:var(--shadow)}
    .hero{padding:34px;text-align:center;background:linear-gradient(135deg,rgba(213,177,90,.10),rgba(255,255,255,.025)),linear-gradient(180deg,rgba(13,32,22,.98),rgba(5,17,11,.98));margin-bottom:22px}
    .hero h1{margin:0;font-size:42px;font-weight:900}.hero p{margin:12px auto 0;color:var(--muted);line-height:1.9;max-width:760px}
    .search-card{padding:28px}.search-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:end}.field{text-align:right}.field label{display:block;margin:0 0 8px;font-weight:900;color:#edf5ef}input,button{font:inherit}input{width:100%;min-height:58px;padding:14px 18px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10);color:var(--text);outline:none}input:focus{border-color:rgba(213,177,90,.48);box-shadow:0 0 0 3px rgba(213,177,90,.10)}
    .btn{min-height:58px;padding:0 24px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.gold{background:linear-gradient(180deg,#e4c36f,#d5b15a);color:#07110b}.btn:hover{transform:translateY(-1px)}
    .forgot{margin-top:16px;display:flex;justify-content:center;gap:10px;align-items:center;color:var(--muted);flex-wrap:wrap}.link-btn{background:none;border:none;color:var(--gold2);font-weight:900;cursor:pointer;text-decoration:underline;padding:0}
    .result{display:none;margin-top:22px;padding:24px}.result.show{display:block}.status-pill{display:inline-flex;padding:10px 16px;border-radius:999px;border:1px solid rgba(213,177,90,.25);background:rgba(213,177,90,.12);color:var(--gold2);font-weight:900}.details{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}.detail{display:flex;justify-content:space-between;gap:12px;padding:14px;border:1px solid rgba(255,255,255,.07);border-radius:18px;background:rgba(255,255,255,.025)}.detail strong{color:var(--muted);font-size:13px}.detail span{text-align:left;font-weight:800}.result-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:18px;z-index:9999}.modal-overlay.show{display:flex}.modal{width:min(760px,100%);max-height:90vh;overflow:auto;border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,#102217,#07130d);box-shadow:0 26px 80px rgba(0,0,0,.45)}.modal-head{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.modal-head h2{margin:0;font-size:28px}.modal-head p{margin:6px 0 0;color:var(--muted);line-height:1.8}.close{width:44px;height:44px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#fff;font-size:22px;cursor:pointer}.modal-body{padding:24px}.lookup-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}.request-list{display:grid;gap:12px;margin-top:18px}.request-item{border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.035);padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.request-item h3{margin:0 0 5px;font-size:17px}.request-item p{margin:0;color:var(--muted);font-size:13px}.toast-wrap{position:fixed;left:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:10001}.toast{min-width:280px;max-width:460px;padding:14px 16px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(180deg,#102217,#07130d);box-shadow:0 20px 45px rgba(0,0,0,.35);font-weight:900}.toast.success{color:#ccffdf;border-color:rgba(21,145,95,.32)}.toast.error{color:#ffd7d7;border-color:rgba(197,82,82,.32)}.toast.warn{color:#ffe79c;border-color:rgba(213,177,90,.32)}
    .review-box{margin-top:16px;padding:16px;border:1px solid rgba(213,177,90,.22);border-radius:18px;background:rgba(213,177,90,.06);line-height:1.9}.review-box h3{margin:0 0 10px;color:var(--gold2);font-size:18px}.review-list{display:grid;gap:10px}.review-item{padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)}.review-item.bad{border-color:rgba(197,82,82,.32);background:rgba(197,82,82,.10);color:#ffd7d7}.review-item.good{border-color:rgba(21,145,95,.28);background:rgba(21,145,95,.10);color:#ccffdf}.review-item.warn{border-color:rgba(213,177,90,.25);background:rgba(213,177,90,.08);color:#ffe79c}.review-item b{display:block;margin-bottom:4px}.home-link-top{margin-top:14px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    @media(max-width:850px){.search-grid,.lookup-grid,.details{grid-template-columns:1fr}.hero h1{font-size:32px}.page{margin:18px auto}.hero,.search-card{padding:22px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>البحث عن الطلب</h1>
      <p>استخدم رقم المرجع مع رقم الجوال المسجل في الطلب. وفي حال نسيان رقم المرجع يمكنك استرجاعه من خلال رقم الجوال والبريد الإلكتروني.</p>
    </section>

    <section class="card search-card">
      <div class="search-grid">
        <div class="field"><label for="refInput">رقم المرجع</label><input id="refInput" placeholder="مثال: REQ-20260504-1234"></div>
        <div class="field"><label for="phoneInput">رقم الجوال</label><input id="phoneInput" placeholder="05xxxxxxxx"></div>
        <button class="btn gold" id="searchBtn" type="button">عرض الطلب</button>
      </div>
      <div class="forgot">نسيت رقم المرجع؟ <button class="link-btn" type="button" id="forgotBtn">استرجاع الطلبات</button></div>
    </section>

    <section class="card result" id="resultBox">
      <span class="status-pill" id="statusLabel">-</span>
      <div class="details" id="detailsBox"></div>
      <div class="result-actions" id="resultActions"></div>
    </section>
  </main>

  <div class="modal-overlay" id="forgotModal">
    <div class="modal">
      <div class="modal-head">
        <div><h2>استرجاع رقم المرجع</h2><p>أدخل رقم الجوال والبريد الإلكتروني المسجلين في الطلب، ثم اختر الطلب المطلوب.</p></div>
        <button class="close" id="closeForgot" type="button">×</button>
      </div>
      <div class="modal-body">
        <div class="lookup-grid">
          <div class="field"><label for="lookupPhone">رقم الجوال</label><input id="lookupPhone" placeholder="05xxxxxxxx"></div>
          <div class="field"><label for="lookupEmail">البريد الإلكتروني</label><input id="lookupEmail" placeholder="example@email.com"></div>
          <button class="btn gold" id="lookupBtn" type="button">استرجاع</button>
        </div>
        <div class="request-list" id="lookupResults"></div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://uwmyqlydenrzkzrymhvl.supabase.co';
    const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3bXlxbHlkZW5yemt6cnltaHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDQ2NjAsImV4cCI6MjA5MzAyMDY2MH0.TCPgHAHhILaD5tFsZiFIgLvH7yuxkrtJ29F5J5oHQrw';
    const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const $=id=>document.getElementById(id);
    const TYPE={player:'لاعب',guardian:'ولي أمر',coach:'مدرب',supporter:'داعم',volunteer:'متطوع'};
    const STATUS={new:'جديد',review:'تحت المراجعة',reviewing:'تحت المراجعة',approved:'مقبول',rejected:'مرفوض',pending:'بانتظار استكمال',needs_completion:'بانتظار استكمال'};
    function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
    function toast(msg,type='success'){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;$('toastWrap').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='.2s';setTimeout(()=>t.remove(),230)},3000)}
    function statusLabel(s){return STATUS[s]||s||'جديد'}
    function typeLabel(t){return TYPE[t]||t||'-'}
    function dateFmt(v){if(!v)return '-';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString('ar-SA',{year:'numeric',month:'2-digit',day:'2-digit'})}
    function isApprovedStatus(s){return ['approved','accepted','معتمد','مقبول'].includes(String(s||'').trim().toLowerCase()) || statusLabel(s)==='مقبول'}
    function shouldComplete(s){return !isApprovedStatus(s) && (['pending','needs_completion'].includes(String(s||'')) || statusLabel(s)==='بانتظار استكمال')}
    function completionUrl(row){return `request_completion.html?request_id=${encodeURIComponent(row.id)}&ref=${encodeURIComponent(row.reference_code||'')}&phone=${encodeURIComponent(row.phone||'')}`}
    function renderRequest(row){
      $('resultBox').classList.add('show');
      $('statusLabel').textContent=statusLabel(row.status);
      $('detailsBox').innerHTML=`
        <div class="detail"><strong>رقم المرجع</strong><span>${esc(row.reference_code||'-')}</span></div>
        <div class="detail"><strong>نوع الطلب</strong><span>${esc(typeLabel(row.request_type))}</span></div>
        <div class="detail"><strong>صاحب الطلب</strong><span>${esc(row.full_name||'-')}</span></div>
        <div class="detail"><strong>رقم الهوية / الإقامة</strong><span>${esc(row.national_id||row.player_national_id||row.child_national_id||'-')}</span></div>
        <div class="detail"><strong>الجوال</strong><span>${esc(row.phone||'-')}</span></div>
        <div class="detail"><strong>المدينة</strong><span>${esc(row.city||'-')}</span></div>
        <div class="detail"><strong>تاريخ الإرسال</strong><span>${esc(dateFmt(row.created_at))}</span></div>`;
      const actions=[];
      if(!isApprovedStatus(row.status)){
        if(shouldComplete(row.status)) actions.push(`<a class="btn gold" href="${completionUrl(row)}">استكمال البيانات والمرفقات</a>`);
        actions.push(`<a class="btn" href="index.html">الرئيسية</a>`);
        actions.push(`<a class="btn" href="al_masariha_join_page.html">تقديم طلب جديد</a>`);
      }
      $('resultActions').innerHTML=actions.join('');
      const oldReview=document.getElementById('completionReviewBox');
      if(oldReview) oldReview.remove();
      const review=document.createElement('div');
      review.id='completionReviewBox';
      review.className='review-box';
      review.innerHTML='<h3>مراجعة المرفقات</h3><div class="review-list"><div class="review-item warn">جاري فحص حالة المرفقات...</div></div>';
      $('resultBox').appendChild(review);
      loadCompletionReview(row);
    }

    const FILE_REVIEW_FIELDS=[
      {label:'الهوية / الإقامة',status:'id_document_status',note:'id_document_note'},
      {label:'الصورة الشخصية',status:'personal_photo_status',note:'personal_photo_note'},
      {label:'العقد الموقّع',status:'contract_file_status',note:'contract_file_note'},
      {label:'التعهد الموقّع',status:'pledge_file_status',note:'pledge_file_note'},
      {label:'الشهادة / المؤهل',status:'certificate_file_status',note:'certificate_file_note'}
    ];
    function isRejected(v){return ['rejected','رفض','مرفوض'].includes(String(v||'').trim().toLowerCase())}
    function isAccepted(v){return ['accepted','approved','قبول','مقبول'].includes(String(v||'').trim().toLowerCase())}
    function reviewStatusText(v){if(isRejected(v))return 'مرفوض'; if(isAccepted(v))return 'مقبول'; return 'قيد المراجعة'}
    async function findOfficialRecord(row){
      return null;
    }
    async function loadCompletionReview(row){
      const box=document.getElementById('completionReviewBox');
      if(!box) return;
      if(isApprovedStatus(row.status)){
        const record=await findOfficialRecord(row);
        const link='';
        box.innerHTML=`<h3>تم اعتماد الطلب رسميًا</h3><div class="review-list"><div class="review-item good"><b>تهانينا، تم اعتماد طلبك رسميًا.</b><span>تم إغلاق مرحلة الاستكمال، ولا يمكن إعادة رفع المرفقات بعد الاعتماد النهائي.</span></div></div><div class="result-actions">${link}<a class="btn" href="index.html">العودة للرئيسية</a></div>`;
        return;
      }
      const {data,error}=await sb.from('request_completions').select('*').eq('request_id',row.id).maybeSingle();
      if(error){console.error(error);box.innerHTML='<h3>مراجعة المرفقات</h3><div class="review-list"><div class="review-item warn">تعذر قراءة حالة المرفقات حاليًا.</div></div>';return}
      if(!data){box.innerHTML='<h3>مراجعة المرفقات</h3><div class="review-list"><div class="review-item warn">لم يتم استكمال المرفقات بعد.</div></div>';return}
      const rejected=FILE_REVIEW_FIELDS.filter(f=>isRejected(data[f.status]));
      const items=(rejected.length?rejected:FILE_REVIEW_FIELDS).map(f=>{
        const cls=isRejected(data[f.status])?'bad':(isAccepted(data[f.status])?'good':'warn');
        const note=data[f.note] ? `<br><span>ملاحظة الإدارة: ${esc(data[f.note])}</span>` : '';
        return `<div class="review-item ${cls}"><b>${esc(f.label)}: ${esc(reviewStatusText(data[f.status]))}</b>${note}</div>`;
      }).join('');
      const title=rejected.length?'مرفقات تحتاج إعادة رفع':'حالة مراجعة المرفقات';
      box.innerHTML=`<h3>${title}</h3><div class="review-list">${items}</div>`;
      if(rejected.length){
        const actions=$('resultActions');
        actions.innerHTML=`<a class="btn gold" href="${completionUrl(row)}">إعادة رفع المرفقات المرفوضة</a><a class="btn" href="index.html">العودة للرئيسية</a><a class="btn" href="al_masariha_join_page.html">تقديم طلب جديد</a>`;
      }
    }

    async function searchRequest(){
      const ref=$('refInput').value.trim(); const phone=$('phoneInput').value.trim();
      if(!ref||!phone){toast('أدخل رقم المرجع ورقم الجوال.','warn');return}
      const {data,error}=await sb.from('join_requests').select('*').eq('reference_code',ref).eq('phone',phone).maybeSingle();
      if(error){console.error(error);toast('تعذر البحث عن الطلب.','error');return}
      if(!data){$('resultBox').classList.remove('show');toast('لم يتم العثور على طلب مطابق.','warn');return}
      renderRequest(data);
    }
    async function lookupRequests(){
      const phone=$('lookupPhone').value.trim(); const email=$('lookupEmail').value.trim(); const box=$('lookupResults');
      if(!phone||!email){toast('أدخل رقم الجوال والبريد الإلكتروني.','warn');return}
      box.innerHTML='<div class="request-item"><p>جاري البحث...</p></div>';
      const {data,error}=await sb.from('join_requests').select('*').eq('phone',phone).eq('email',email).order('created_at',{ascending:false}).limit(20);
      if(error){console.error(error);box.innerHTML='<div class="request-item"><p>تعذر استرجاع الطلبات.</p></div>';return}
      if(!data||!data.length){box.innerHTML='<div class="request-item"><p>لا توجد طلبات مطابقة لهذا الجوال والبريد.</p></div>';return}
      box.innerHTML=data.map(r=>`<div class="request-item"><div><h3>${esc(typeLabel(r.request_type))} - ${esc(statusLabel(r.status))}</h3><p>${esc(r.full_name||'-')} • ${esc(dateFmt(r.created_at))}</p><p>رقم المرجع: <b>${esc(r.reference_code||'-')}</b></p></div><button class="btn gold" type="button" data-ref="${esc(r.reference_code||'')}" data-phone="${esc(r.phone||'')}">اختيار</button></div>`).join('');
      box.querySelectorAll('button[data-ref]').forEach(btn=>btn.addEventListener('click',()=>{$('refInput').value=btn.dataset.ref;$('phoneInput').value=btn.dataset.phone;$('forgotModal').classList.remove('show');searchRequest()}));
    }
    document.addEventListener('DOMContentLoaded',()=>{
      const params=new URLSearchParams(location.search); if(params.get('ref')) $('refInput').value=params.get('ref'); if(params.get('phone')) $('phoneInput').value=params.get('phone'); if($('refInput').value&&$('phoneInput').value) searchRequest();
      $('searchBtn').addEventListener('click',searchRequest); $('forgotBtn').addEventListener('click',()=>$('forgotModal').classList.add('show')); $('closeForgot').addEventListener('click',()=>$('forgotModal').classList.remove('show')); $('lookupBtn').addEventListener('click',lookupRequests); $('forgotModal').addEventListener('click',e=>{if(e.target===$('forgotModal'))$('forgotModal').classList.remove('show')});
    });
  </script>
</body>
</html>
