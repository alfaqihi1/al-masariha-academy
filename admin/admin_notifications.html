<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إشعارات الإدارة | أكاديمية المسارحة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#d5b15a;--gold2:#f0d58f;--text:#f3f4ef;--muted:#b6c1b8;--line:rgba(255,255,255,.08);--shadow:0 22px 55px rgba(0,0,0,.26)}
*{box-sizing:border-box}
body{margin:0;font-family:'Cairo',system-ui,sans-serif;background:radial-gradient(circle at top,rgba(213,177,90,.10),transparent 28%),linear-gradient(180deg,#030a07,#06130d 42%,#041009);color:var(--text);min-height:100vh}
.layout{display:grid;grid-template-columns:318px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,rgba(213,177,90,.10),rgba(255,255,255,.02));border-left:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow:hidden}
.brand{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:18px}
.brand h1{margin:0;color:var(--gold2);font-weight:900;font-size:26px}
.brand p{margin:8px 0 0;color:var(--muted);line-height:1.9}
.main{padding:30px;width:min(1450px,100%)}
.hero,.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));box-shadow:var(--shadow)}
.hero{padding:34px;background:linear-gradient(135deg,rgba(213,177,90,.10),rgba(255,255,255,.025)),linear-gradient(180deg,rgba(13,32,22,.98),rgba(5,17,11,.98));margin-bottom:22px}
.hero h1{margin:0;font-size:42px;font-weight:900}
.hero p{margin:12px 0 0;color:var(--muted);line-height:1.9}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.stat{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.035);padding:18px;box-shadow:var(--shadow)}
.stat span{display:block;color:var(--muted);font-size:13px;font-weight:800}
.stat strong{display:block;margin-top:8px;color:var(--gold2);font-size:34px;font-weight:900}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px}
.btn{min-height:48px;padding:0 18px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:#fff;font:inherit;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.gold{background:linear-gradient(180deg,#e4c36f,#d5b15a);color:#07110b}
.list{display:grid;gap:12px}
.item{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.035);padding:18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
.item.unread{border-color:rgba(213,177,90,.35);background:linear-gradient(135deg,rgba(213,177,90,.10),rgba(255,255,255,.03))}
.item h3{margin:0 0 6px;font-size:20px}
.item p{margin:0;color:var(--muted);line-height:1.8}
.meta{margin-top:8px;color:var(--gold2);font-weight:900;font-size:13px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.empty{padding:28px;text-align:center;color:var(--muted)}
.toast{position:fixed;left:20px;bottom:20px;max-width:520px;padding:14px 16px;border-radius:16px;border:1px solid rgba(213,177,90,.32);background:#102217;color:#ffe79c;font-weight:900;display:none;z-index:10001}
.toast.show{display:block}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.stats{grid-template-columns:1fr}.main{padding:18px}.item{grid-template-columns:1fr}}
</style>
<script>
if(localStorage.getItem('adminLoggedIn')!=='true'){window.location.href='admin_login.html'}
function adminLogout(){localStorage.removeItem('adminLoggedIn');window.location.href='admin_login.html'}
</script>
</head>
<body>
<div class="layout">
<aside class="sidebar">
<div class="brand"><h1>أكاديمية كرة القدم</h1><p>مركز تنبيهات الإدارة ومتابعة استكمال الطلبات.</p></div>
<div id="admin-sidebar"></div>
</aside>
<main class="main">
<section class="hero"><h1>إشعارات الإدارة</h1><p>تظهر هنا إشعارات استكمال البيانات والمرفقات حتى لا تحتاج الإدارة لمراجعة الصفحات يدويًا.</p></section>
<section class="stats">
<div class="stat"><span>غير المقروءة</span><strong id="unreadCount">0</strong></div>
<div class="stat"><span>إجمالي الإشعارات</span><strong id="totalCount">0</strong></div>
<div class="stat"><span>استكمالات جديدة</span><strong id="completionCount">0</strong></div>
</section>
<section class="card" style="padding:22px">
<div class="toolbar">
<div class="actions"><button class="btn gold" id="refreshBtn" type="button">تحديث</button><button class="btn" id="markAllBtn" type="button">تحديد الكل كمقروء</button></div>
<a class="btn" href="admin_completion_dashboard.html">فتح استكمال الطلبات</a>
</div>
<div class="list" id="notificationsList"><div class="empty">جاري تحميل الإشعارات...</div></div>
</section>
</main>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin_sidebar.js"></script>
<script>
const SUPABASE_URL="https://uwmyqlydenrzkzrymhvl.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3bXlxbHlkZW5yemt6cnltaHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDQ2NjAsImV4cCI6MjA5MzAyMDY2MH0.TCPgHAHhILaD5tFsZiFIgLvH7yuxkrtJ29F5J5oHQrw";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const $=id=>document.getElementById(id);

function toast(msg){
  $('toast').textContent=msg;
  $('toast').classList.add('show');
  setTimeout(()=>$('toast').classList.remove('show'),3000);
}

function esc(v){
  return String(v??'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];});
}

function fmtDate(v){
  if(!v)return '-';
  const d=new Date(v);
  return Number.isNaN(d.getTime())?v:d.toLocaleString('ar-SA');
}

async function loadNotifications(){
  const result=await sb.from('admin_notifications').select('*').order('created_at',{ascending:false}).limit(50);
  if(result.error){
    console.error(result.error);
    $('notificationsList').innerHTML='<div class="empty">تعذر تحميل الإشعارات. تأكد من تشغيل SQL.</div>';
    return;
  }
  const rows=result.data||[];
  $('totalCount').textContent=rows.length;
  $('unreadCount').textContent=rows.filter(r=>!r.is_read).length;
  $('completionCount').textContent=rows.filter(r=>r.notification_type==='completion'&&!r.is_read).length;

  if(!rows.length){
    $('notificationsList').innerHTML='<div class="empty">لا توجد إشعارات حالياً.</div>';
    return;
  }

  $('notificationsList').innerHTML=rows.map(function(r){
    return `
      <div class="item ${!r.is_read?'unread':''}">
        <div>
          <h3>${esc(r.title)}</h3>
          <p>${esc(r.message)}</p>
          <div class="meta">المرجع: ${esc(r.reference_code||'-')} • ${esc(fmtDate(r.created_at))}</div>
        </div>
        <div class="actions">
          <a class="btn gold" href="admin_completion_dashboard.html">مراجعة</a>
          ${!r.is_read?`<button class="btn" type="button" onclick="markRead('${r.id}')">تمت القراءة</button>`:''}
        </div>
      </div>`;
  }).join('');
}

async function markRead(id){
  const result=await sb.from('admin_notifications').update({is_read:true}).eq('id',id);
  if(result.error){toast('تعذر تحديث الإشعار');return}
  loadNotifications();
}

async function markAll(){
  const result=await sb.from('admin_notifications').update({is_read:true}).eq('is_read',false);
  if(result.error){toast('تعذر تحديث الإشعارات');return}
  toast('تم تحديد جميع الإشعارات كمقروءة');
  loadNotifications();
}

$('refreshBtn').onclick=loadNotifications;
$('markAllBtn').onclick=markAll;
document.addEventListener('DOMContentLoaded',loadNotifications);
</script>
</body>
</html>
