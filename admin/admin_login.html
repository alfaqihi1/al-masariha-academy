<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل دخول الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top, rgba(212,175,55,.10), transparent 28%),linear-gradient(180deg,#09111f 0%, #0d1628 100%);color:#ecf2ff}
.box{width:min(420px, calc(100% - 28px));background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:26px;box-shadow:0 18px 45px rgba(0,0,0,.22)}
h2{margin:0 0 8px;color:#f5d46b;font-size:32px;font-weight:900}
p{margin:0 0 18px;color:#9fb0d1;line-height:1.8;font-size:14px}
label{display:block;margin:0 0 8px;font-weight:800}
input{width:100%;box-sizing:border-box;padding:14px 16px;margin:0 0 14px;background:rgba(7,12,22,.72);color:#ecf2ff;border:1px solid rgba(255,255,255,.10);border-radius:14px;font-family:inherit;font-size:14px}
button{width:100%;padding:14px 16px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#d4af37,#f5d46b);color:#1a1a1a;font-family:inherit;font-weight:900;font-size:16px}
.err{display:none;margin-top:12px;padding:10px 12px;border-radius:12px;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.25);color:#ffd9d9;font-weight:800}
.err.show{display:block}
.hint{margin-top:12px;color:#9fb0d1;font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="box">
  <h2>دخول الإدارة</h2>
  <p>سجل الدخول للانتقال إلى لوحة الإدارة.</p>
  <label for="u">اسم المستخدم</label>
  <input type="text" id="u" placeholder="اسم المستخدم">
  <label for="p">كلمة المرور</label>
  <input type="password" id="p" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <div id="err" class="err">بيانات غير صحيحة.</div>
  <div class="hint">البيانات المؤقتة: admin / 1234</div>
</div>
<script>

function login(){
  if (document.getElementById("u").value.trim() === "admin" && document.getElementById("p").value.trim() === "1234") {
    localStorage.setItem("adminLoggedIn","true");
    location.href = "admin_dashboard.html";
  } else {
    document.getElementById("err").classList.add("show");
  }
}
document.getElementById("p").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});
</script>
</body>
</html>
