<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>عرض ملف المدرب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --line:rgba(255,255,255,.08);
  --text:#ecf2ff;
  --muted:#9fb0d1;
  --gold:#d4af37;
  --gold-2:#f5d46b;
  --shadow:0 18px 45px rgba(0,0,0,.22);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#09111f 0%,#0d1628 100%);
  color:var(--text);
}
body{min-height:100vh}
.wrap{max-width:1320px;margin:auto;padding:30px 20px}
.topbar{
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  flex-wrap:wrap;margin-bottom:24px
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:13px 18px;border-radius:14px;border:1px solid var(--line);
  text-decoration:none;font-weight:800;color:#fff;background:rgba(255,255,255,.04)
}
.hero{
  display:grid;grid-template-columns:320px 1fr;gap:20px;margin-bottom:24px
}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden
}
.card-body{padding:22px}
.photo{
  width:100%;aspect-ratio:1/1;border-radius:24px;overflow:hidden;
  border:1px solid rgba(212,175,55,.18);
  background:linear-gradient(135deg,#1d2943,#0c1321);
  display:flex;align-items:center;justify-content:center;
  font-size:72px;color:var(--gold-2)
}
.photo img{width:100%;height:100%;object-fit:cover}
h1{margin:0 0 8px;font-size:34px}
.subtitle{color:var(--gold-2);font-weight:800;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.item{
  background:rgba(255,255,255,.03);border:1px solid var(--line);
  border-radius:18px;padding:14px
}
.item span{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
.item strong{font-size:17px}
.bio{
  margin-top:18px;background:rgba(255,255,255,.03);border:1px solid var(--line);
  border-radius:18px;padding:16px;line-height:1.9;color:#eef3ff
}

.section-head{
  display:flex;justify-content:space-between;align-items:center;
  gap:14px;flex-wrap:wrap;margin:0 0 16px
}
.section-head h2{
  margin:0;font-size:28px;font-weight:900
}
.section-head p{
  margin:6px 0 0;color:var(--muted);font-size:14px
}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:9px 14px;border-radius:999px;
  background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.24);
  color:#f5d46b;font-weight:900;font-size:13px
}
.players-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}
.player-fifa-card{
  position:relative;
  min-height:360px;
  border-radius:28px;
  overflow:hidden;
  border:1px solid rgba(212,175,55,.18);
  background:
    radial-gradient(circle at 20% 15%, rgba(245,212,107,.15), transparent 20%),
    radial-gradient(circle at 80% 10%, rgba(88,166,255,.12), transparent 22%),
    linear-gradient(180deg, rgba(20,31,56,.96), rgba(10,18,32,.98));
  box-shadow:0 20px 50px rgba(0,0,0,.24);
}
.player-fifa-card::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,.18) 100%);
  pointer-events:none;
}
.player-card-inner{
  position:relative;z-index:1;
  padding:18px 18px 20px;
  display:flex;flex-direction:column;height:100%;
}
.player-card-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px
}
.ovr-box,.shirt-box{
  min-width:68px;min-height:82px;border-radius:22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-weight:900
}
.ovr-box{
  background:linear-gradient(180deg,#f0d37d,#d5ad51);
  color:#17120a;box-shadow:0 12px 26px rgba(212,175,55,.18)
}
.ovr-box small{font-size:12px;margin-top:4px}
.shirt-box{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  color:#fff;font-size:21px
}
.position-pill{
  align-self:center;
  padding:8px 14px;border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:#eaf1ff;font-size:13px;font-weight:800
}
.player-avatar{
  width:156px;height:156px;border-radius:50%;
  margin:10px auto 16px;
  border:4px solid rgba(212,175,55,.28);
  box-shadow:0 0 0 12px rgba(255,255,255,.03);
  overflow:hidden;
  background:linear-gradient(135deg,#233556,#12203a);
  display:flex;align-items:center;justify-content:center;
  color:#f5d46b;font-size:54px;font-weight:900
}
.player-avatar img{width:100%;height:100%;object-fit:cover}
.player-name{
  margin:0;text-align:center;font-size:24px;font-weight:900;line-height:1.35
}
.player-meta{
  text-align:center;color:var(--muted);font-size:14px;font-weight:800;margin-top:6px
}
.player-mini-stats{
  margin-top:18px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px
}
.player-mini-stat{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:10px 8px;text-align:center
}
.player-mini-stat span{
  display:block;color:var(--muted);font-size:11px;margin-bottom:4px
}
.player-mini-stat strong{
  font-size:16px;color:#fff
}
.player-footer{
  margin-top:auto;padding-top:16px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap
}
.player-tags{
  display:flex;flex-wrap:wrap;gap:8px
}
.player-tag{
  padding:7px 10px;border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:#eef3ff;font-size:12px;font-weight:800
}
.player-view-btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:10px 14px;border-radius:14px;text-decoration:none;
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#1a1a1a;font-weight:900;border:none
}
.empty{
  padding:60px 20px;text-align:center;color:var(--muted);font-weight:800
}
.empty-players{
  padding:34px 22px;text-align:center;
  border-radius:22px;border:1px dashed rgba(255,255,255,.12);
  background:rgba(255,255,255,.02);color:var(--muted);line-height:2
}
@media (max-width:900px){
  .hero{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="btn" href="coaches_dashboard.html">← العودة إلى قائمة المدربين</a>
    <a class="btn" href="coaches_add_dashboard.html">+ إضافة مدرب جديد</a>
  </div>
  <div id="app"></div>
</div>

<script>
const COACHES_STORAGE_KEY = 'academyCoaches';
const PLAYERS_STORAGE_KEY = 'academyPlayers';

function readCoaches(){
  try{
    const raw = JSON.parse(localStorage.getItem(COACHES_STORAGE_KEY) || '[]');
    return Array.isArray(raw) ? raw : [];
  }catch(e){ return []; }
}

function readPlayers(){
  try{
    const raw = JSON.parse(localStorage.getItem(PLAYERS_STORAGE_KEY) || '[]');
    return Array.isArray(raw) ? raw : [];
  }catch(e){ return []; }
}

function escapeHtml(v){
  return String(v ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function getInitials(name){
  const text = String(name || '').trim();
  if(!text) return '؟';
  const parts = text.split(/\s+/).filter(Boolean);
  if(parts.length === 1) return parts[0].slice(0,2);
  return (parts[0][0] || '') + (parts[1][0] || '');
}

function normalizeCategory(category){
  return String(category || '').replace('فئة ','').trim() || '-';
}

function overallFromPlayer(player){
  const values = ['pac','sho','pas','dri','def','phy']
    .map(key => Number(player[key]))
    .filter(v => !isNaN(v) && v > 0);
  if(values.length) return Math.round(values.reduce((a,b)=>a+b,0) / values.length);
  const seed = Number(player.id || 1);
  return Math.min(93, 63 + ((seed * 7) % 24));
}

function getLinkedPlayers(coach){
  const players = readPlayers();
  return players.filter(player => {
    const checks = [
      player.coachId,
      player.assignedCoachId,
      player.supervisorCoachId,
      player.linkedCoachId
    ].map(v => String(v || '').trim());

    if (checks.includes(String(coach.id))) return true;

    const nameChecks = [
      player.coachName,
      player.assignedCoachName,
      player.supervisorCoachName,
      player.linkedCoachName
    ].map(v => String(v || '').trim());

    if (nameChecks.includes(String(coach.fullName || '').trim())) return true;

    const codeChecks = [
      player.coachCode,
      player.assignedCoachCode,
      player.linkedCoachCode
    ].map(v => String(v || '').trim());

    if (codeChecks.includes(String(coach.code || '').trim())) return true;

    return false;
  });
}

function renderPlayerCard(player){
  const fullName = escapeHtml(player.fullName || '-');
  const shirt = escapeHtml(player.shirtNumber || player.code || '-');
  const category = escapeHtml(normalizeCategory(player.category));
  const position = escapeHtml(player.position || 'لاعب');
  const foot = escapeHtml(player.preferredFoot || 'القدم اليمنى');
  const overall = escapeHtml(overallFromPlayer(player));
  const age = escapeHtml(player.age || '—');
  const status = escapeHtml(player.playerStatus || player.status || 'نشط');
  const city = escapeHtml(player.city || '—');
  const avatar = player.image
    ? `<img src="${escapeHtml(player.image)}" alt="${fullName}">`
    : `<span>${escapeHtml(getInitials(player.fullName || ''))}</span>`;

  return `
    <article class="player-fifa-card">
      <div class="player-card-inner">
        <div class="player-card-top">
          <div class="ovr-box">${overall}<small>OVR</small></div>
          <div class="position-pill">${position}</div>
          <div class="shirt-box">${shirt}</div>
        </div>

        <div class="player-avatar">${avatar}</div>

        <h3 class="player-name">${fullName}</h3>
        <div class="player-meta">${category} • ${city}</div>

        <div class="player-mini-stats">
          <div class="player-mini-stat"><span>العمر</span><strong>${age}</strong></div>
          <div class="player-mini-stat"><span>القدم</span><strong>${foot}</strong></div>
          <div class="player-mini-stat"><span>الحالة</span><strong>${status}</strong></div>
        </div>

        <div class="player-footer">
          <div class="player-tags">
            <span class="player-tag">${category}</span>
            <span class="player-tag">${position}</span>
          </div>
          <a class="player-view-btn" href="player_view_dashboard.html?id=${encodeURIComponent(player.id || '')}">عرض اللاعب</a>
        </div>
      </div>
    </article>
  `;
}

const params = new URLSearchParams(window.location.search);
const id = Number(params.get('id') || 0);
const coach = readCoaches().find(c => Number(c.id) === id);
const app = document.getElementById('app');

if(!coach){
  app.innerHTML = '<div class="card"><div class="empty">تعذر العثور على ملف المدرب المطلوب.</div></div>';
} else {
  const linkedPlayers = getLinkedPlayers(coach);

  app.innerHTML = `
    <div class="hero">
      <div class="card">
        <div class="card-body">
          <div class="photo">${coach.image ? `<img src="${escapeHtml(coach.image)}" alt="${escapeHtml(coach.fullName)}">` : getInitials(coach.fullName)}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h1>${escapeHtml(coach.fullName || '-')}</h1>
          <div class="subtitle">${escapeHtml(coach.jobTitle || '-')} • ${escapeHtml(coach.specialty || '-')}</div>

          <div class="grid">
            <div class="item"><span>الكود</span><strong>${escapeHtml(coach.code || '-')}</strong></div>
            <div class="item"><span>الفئة</span><strong>${escapeHtml(coach.category || '-')}</strong></div>
            <div class="item"><span>سنوات الخبرة</span><strong>${escapeHtml(coach.experienceYears ? coach.experienceYears + ' سنة' : '-')}</strong></div>
            <div class="item"><span>الجوال</span><strong>${escapeHtml(coach.phone || '-')}</strong></div>
            <div class="item"><span>الحالة</span><strong>${escapeHtml(coach.coachStatus || coach.status || '-')}</strong></div>
            <div class="item"><span>أبرز شهادة</span><strong>${escapeHtml(coach.certification || '-')}</strong></div>
          </div>

          <div class="bio">
            <strong style="display:block;margin-bottom:8px;color:var(--gold-2)">نبذة تعريفية</strong>
            ${escapeHtml(coach.bio || 'لا توجد نبذة مضافة حاليًا.')}
          </div>
        </div>
      </div>
    </div>

    <section class="card">
      <div class="card-body">
        <div class="section-head">
          <div>
            <h2>اللاعبون المرتبطون بالمدرب</h2>
            <p>عرض احترافي للاعبين المرتبطين بهذا المدرب داخل النظام.</p>
          </div>
          <span class="badge">إجمالي اللاعبين: ${linkedPlayers.length}</span>
        </div>

        ${
          linkedPlayers.length
          ? `<div class="players-grid">${linkedPlayers.map(renderPlayerCard).join('')}</div>`
          : `<div class="empty-players">
               لا يوجد لاعبون مرتبطون بهذا المدرب حاليًا.<br>
               عند ربط اللاعب بالمدرب داخل بيانات اللاعب سيظهر هنا تلقائيًا.
             </div>`
        }
      </div>
    </section>
  `;
}
</script>

<script src="admin_sidebar.js"></script>
</body>
</html>
